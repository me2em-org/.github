# .github/.github/workflows/reusable-ci.yml
name: Reusable CI Pipeline

on:
  workflow_call:
    inputs:
      package-path:
        description: 'Path to the package to build (for monorepos)'
        required: false
        type: string
        default: '.'
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '20'
      run-tests:
        description: 'Whether to run tests'
        required: false
        type: boolean
        default: true
      publish-npm:
        description: 'Whether to publish to npm (on main branch only)'
        required: false
        type: boolean
        default: false

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ inputs.package-path }}

      - name: Lint
        run: pnpm lint
        working-directory: ${{ inputs.package-path }}

      - name: Type check
        run: pnpm typecheck
        working-directory: ${{ inputs.package-path }}
        if: ${{ inputs.run-tests }}

      - name: Test
        run: pnpm test -- --coverage
        working-directory: ${{ inputs.package-path }}
        if: ${{ inputs.run-tests }}

      - name: Build
        run: pnpm build
        working-directory: ${{ inputs.package-path }}

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: ${{ inputs.publish-npm && github.ref == 'refs/heads/main' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile
          pnpm build
        working-directory: ${{ inputs.package-path }}

      - name: Publish
        run: pnpm publish --access public --no-git-checks
        working-directory: ${{ inputs.package-path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}